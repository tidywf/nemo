tables:
  table1:
    description: 'Table1 for tool1 (txt: header present, tab-delimited).'
    pattern: "\\.tool1\\.table1\\.tsv$"
    ftype: 'txt'
    columns:
      - raw: 'SampleID'
        tidy: 'sample_id'
        type: 'char'
        description: 'sample ID'
        since: 'v1.2.3'
      - raw: 'Chromosome'
        tidy: 'chromosome'
        type: 'char'
        description: 'chromosome'
        since: 'v1.2.3'
      - raw: 'Start'
        tidy: 'start'
        type: 'int'
        description: 'start position'
        since: 'v1.2.3'
      - raw: 'End'
        tidy: 'end'
        type: 'int'
        description: 'end position'
        since: 'v1.2.3'
      - raw: 'metricX'
        tidy: 'metric_x'
        type: 'float'
        description: 'metric X'
        since: 'v1.2.3'
      - raw: 'metricY'
        tidy: 'metric_y'
        type: 'float'
        description: 'metric Y'
        since: 'latest'
      - raw: 'metricZ'
        tidy: 'metric_z'
        type: 'float'
        description: 'metric Z'
        since: 'latest'
  table2:
    description: 'Table2 for tool1 (txt: header present, tab-delimited).'
    pattern: "\\.tool1\\.table2\\.tsv$"
    ftype: 'txt'
    columns:
      - raw: 'SampleID'
        tidy: 'sample_id'
        type: 'char'
        description: 'sample ID'
        since: 'latest'
      - raw: 'metricA'
        tidy: 'metric_a'
        type: 'char'
        description: 'metric A'
        since: 'latest'
      - raw: 'metricB'
        tidy: 'metric_b'
        type: 'float'
        description: 'metric B'
        since: 'latest'
  table3:
    description: 'Table3 for tool1 (txt-keyvalue: no header, 2 cols, col1=key col2=value).'
    pattern: "\\.tool1\\.table3\\.tsv$"
    ftype: 'txt-keyvalue'
    columns:
      - raw: 'SampleID'
        tidy: 'sample_id'
        type: 'char'
        description: 'sample ID'
        since: 'latest'
      - raw: 'QCStatus'
        tidy: 'qcstatus'
        type: 'char'
        description: 'QC status'
        since: 'latest'
      - raw: 'TotalReads'
        tidy: 'reads_total'
        type: 'float'
        description: 'total reads'
        since: 'latest'
      - raw: 'MappedReads'
        tidy: 'reads_map'
        type: 'float'
        description: 'mapped reads'
        since: 'latest'
      - raw: 'UnmappedReads'
        tidy: 'reads_unmap'
        type: 'float'
        description: 'unmapped reads'
        since: 'latest'
  table4:
    description: 'Table4 for tool1 (txt-nohead: no header, positional cols X1..XN).'
    pattern: "\\.tool1\\.table4\\.tsv$"
    ftype: 'txt-nohead'
    columns:
      - raw: 'X1'
        tidy: 'sample_id'
        type: 'char'
        description: 'sample ID'
        since: 'latest'
      - raw: 'X2'
        tidy: 'chromosome'
        type: 'char'
        description: 'chromosome'
        since: 'latest'
      - raw: 'X3'
        tidy: 'start'
        type: 'int'
        description: 'start position'
        since: 'latest'
      - raw: 'X4'
        tidy: 'end'
        type: 'int'
        description: 'end position'
        since: 'latest'
      - raw: 'X5'
        tidy: 'depth'
        type: 'float'
        description: 'depth'
        since: 'latest'
  table5:
    description: 'Table5 for tool1 (csv-nohead-long: no header, long format with metric name col).'
    pattern: "\\.tool1\\.table5\\.csv$"
    ftype: 'csv-nohead-long'
    columns:
      - raw: 'Total reads'
        tidy: 'reads_total'
        type: 'float'
        description: 'total reads'
        since: 'latest'
      - raw: 'Mapped reads'
        tidy: 'reads_map'
        type: 'float'
        description: 'mapped reads'
        since: 'latest'
      - raw: 'Unmapped reads'
        tidy: 'reads_unmap'
        type: 'float'
        description: 'unmapped reads'
        since: 'latest'
      - raw: 'Total bases'
        tidy: 'bases_total'
        type: 'float'
        description: 'total bases'
        since: 'latest'
