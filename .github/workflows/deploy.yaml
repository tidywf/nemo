name: conda-docs

on:
  push:
    branches:
      - main
      - dev

jobs:
  condarise:
    name: 🐍 Condarise
    if: "startsWith(github.event.head_commit.message, 'Bump version:')"
    uses: tidywf/actions/.github/workflows/condarise.yaml@main
    permissions:
      contents: write
    with:
      pkg_name: nemo
      pkg_version: '0.0.3.9013' # bump
    secrets: inherit

  tag:
    name: 🔖 Tag
    needs: [condarise]
    uses: tidywf/actions/.github/workflows/tag.yaml@main
    permissions:
      contents: write
    with:
      pkg_version: '0.0.3.9013' # bump
    secrets: inherit

  pkgdownise:
    name: 🌐 Pkgdownise
    needs: [tag]
    uses: tidywf/actions/.github/workflows/pkgdownise.yaml@main
    permissions:
      contents: write
    with:
      pkg_name: nemo
      pkg_version: '0.0.3.9013' # bump
    secrets: inherit
